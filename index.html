<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Babduu ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
  color: white;
  text-align: center;
}

/* Opening screen */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ff758c;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2em;
  cursor: pointer;
  z-index: 10;
}

/* Hearts */
.heart {
  position: absolute;
  bottom: -20px;
  font-size: 18px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* Content */
h1 {
  margin-top: 40px;
  font-size: 2.5em;
}

#text {
  width: 80%;
  margin: auto;
  font-size: 1.2em;
  min-height: 80px;
}

/* Slideshow */
.slideshow {
  max-width: 320px;
  margin: 30px auto;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

img {
  width: 100%;
  position: absolute;
  opacity: 0;
  transition: opacity 1s ease;
}

img.active {
  opacity: 1;
  position: relative;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="startScreen" onclick="startSite()">Tap to open ❤️</div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6d6f9b6b56.mp3" type="audio/mpeg">
</audio>

<h1>Hey My Babduu ❤️</h1>
<p id="text"></p>

<div class="slideshow">
  <img src="photo1.jpg" class="active">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
  <img src="photo4.jpg">
  <img src="photo5.jpg">
</div>

<button onclick="nextSlide()">Next ❤️</button>

<script>
/* Start */
function startSite() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("music").play();
  typeWriter();
}

/* Typing message */
const message = "Babduu... I don’t even know where to start. Every moment with you feels so special. From laughing together to those quiet little moments… everything just feels right with you. I’m really lucky to have you. I love you more than words can ever explain ❤️ — Your Kuchu Puchuu";

let i = 0;
function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

/* Slideshow */
let index = 0;
const slides = document.querySelectorAll(".slideshow img");

function nextSlide() {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}

setInterval(nextSlide, 3500);

/* Hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
